<figure class="italy-map" aria-label="Mappa navigabile delle regioni italiane">
  <svg viewBox="0 0 1200 1500" role="img" aria-labelledby="italy-map-title italy-map-desc">
    <title id="italy-map-title">Mappa dell'Italia per regioni e province autonome</title>
    <desc id="italy-map-desc">Mappa SVG dell'Italia basata su Wikimedia Commons, con link alle pagine territoriali.</desc>

    <rect class="map-panel" x="0" y="0" width="1200" height="1500" rx="18" />
    <image
      class="map-base"
      href="{{ '/assets/img/italy-regions-wikimedia.svg' | relative_url }}"
      x="0"
      y="0"
      width="1200"
      height="1500"
      preserveAspectRatio="xMidYMid meet" />

    <g class="map-links">
      <a href="{{ '/regioni/valle-d-aosta/' | relative_url }}" aria-label="Valle d'Aosta">
        <circle class="map-hotspot" cx="150" cy="225" r="58" />
        <text x="150" y="225">Valle d'Aosta</text>
      </a>

      <a href="{{ '/regioni/piemonte/' | relative_url }}" aria-label="Piemonte">
        <circle class="map-hotspot" cx="170" cy="365" r="78" />
        <text x="170" y="365">Piemonte</text>
      </a>

      <a href="{{ '/regioni/lombardia/' | relative_url }}" aria-label="Lombardia">
        <circle class="map-hotspot" cx="300" cy="280" r="88" />
        <text x="300" y="280">Lombardia</text>
      </a>

      <a href="{{ '/regioni/provincia-autonoma-di-bolzano/' | relative_url }}" aria-label="Provincia autonoma di Bolzano">
        <circle class="map-hotspot" cx="415" cy="105" r="62" />
        <text x="415" y="95">Bolzano</text>
      </a>

      <a href="{{ '/regioni/provincia-autonoma-di-trento/' | relative_url }}" aria-label="Provincia autonoma di Trento">
        <circle class="map-hotspot" cx="430" cy="175" r="56" />
        <text x="430" y="180">Trento</text>
      </a>

      <a href="{{ '/regioni/veneto/' | relative_url }}" aria-label="Veneto">
        <circle class="map-hotspot" cx="550" cy="300" r="78" />
        <text x="550" y="300">Veneto</text>
      </a>

      <a href="{{ '/regioni/friuli-venezia-giulia/' | relative_url }}" aria-label="Friuli-Venezia Giulia">
        <circle class="map-hotspot" cx="720" cy="205" r="80" />
        <text x="720" y="195">Friuli-</text>
        <text x="720" y="229">Venezia Giulia</text>
      </a>

      <a href="{{ '/regioni/liguria/' | relative_url }}" aria-label="Liguria">
        <circle class="map-hotspot" cx="260" cy="450" r="62" />
        <text x="260" y="450">Liguria</text>
      </a>

      <a href="{{ '/regioni/emilia-romagna/' | relative_url }}" aria-label="Emilia-Romagna">
        <circle class="map-hotspot" cx="465" cy="395" r="96" />
        <text x="465" y="395">Emilia-Romagna</text>
      </a>

      <a href="{{ '/regioni/toscana/' | relative_url }}" aria-label="Toscana">
        <circle class="map-hotspot" cx="430" cy="530" r="82" />
        <text x="430" y="530">Toscana</text>
      </a>

      <a href="{{ '/regioni/marche/' | relative_url }}" aria-label="Marche">
        <circle class="map-hotspot" cx="570" cy="480" r="62" />
        <text x="570" y="480">Marche</text>
      </a>

      <a href="{{ '/regioni/umbria/' | relative_url }}" aria-label="Umbria">
        <circle class="map-hotspot" cx="520" cy="540" r="58" />
        <text x="520" y="540">Umbria</text>
      </a>

      <a href="{{ '/regioni/lazio/' | relative_url }}" aria-label="Lazio">
        <circle class="map-hotspot" cx="565" cy="690" r="75" />
        <text x="565" y="690">Lazio</text>
      </a>

      <a href="{{ '/regioni/abruzzo/' | relative_url }}" aria-label="Abruzzo">
        <circle class="map-hotspot" cx="690" cy="715" r="65" />
        <text x="690" y="715">Abruzzo</text>
      </a>

      <a href="{{ '/regioni/molise/' | relative_url }}" aria-label="Molise">
        <circle class="map-hotspot" cx="780" cy="760" r="52" />
        <text x="780" y="760">Molise</text>
      </a>

      <a href="{{ '/regioni/campania/' | relative_url }}" aria-label="Campania">
        <circle class="map-hotspot" cx="710" cy="780" r="70" />
        <text x="710" y="780">Campania</text>
      </a>

      <a href="{{ '/regioni/puglia/' | relative_url }}" aria-label="Puglia">
        <circle class="map-hotspot" cx="865" cy="745" r="86" />
        <text x="865" y="745">Puglia</text>
      </a>

      <a href="{{ '/regioni/basilicata/' | relative_url }}" aria-label="Basilicata">
        <circle class="map-hotspot" cx="885" cy="855" r="68" />
        <text x="885" y="855">Basilicata</text>
      </a>

      <a href="{{ '/regioni/calabria/' | relative_url }}" aria-label="Calabria">
        <circle class="map-hotspot" cx="880" cy="1145" r="92" />
        <text x="880" y="1145">Calabria</text>
      </a>

      <a href="{{ '/regioni/sardegna/' | relative_url }}" aria-label="Sardegna">
        <circle class="map-hotspot" cx="270" cy="930" r="95" />
        <text x="270" y="930">Sardegna</text>
      </a>

      <a href="{{ '/regioni/sicilia/' | relative_url }}" aria-label="Sicilia">
        <circle class="map-hotspot" cx="670" cy="1225" r="105" />
        <text x="670" y="1225">Sicilia</text>
      </a>
    </g>
  </svg>

  <figcaption>
    Base SVG adattata da
    <a href="https://commons.wikimedia.org/wiki/File:Regions_of_Italy_with_Italian_Names.svg">Wikimedia Commons, <em>Regions of Italy with Italian Names.svg</em></a>.
  </figcaption>
</figure>

<noscript>
  <ul class="region-fallback">
    {% for regione in site.data.regioni %}
      <li><a href="{{ '/regioni/' | append: regione.slug | append: '/' | relative_url }}">{{ regione.title }}</a></li>
    {% endfor %}
  </ul>
</noscript>
