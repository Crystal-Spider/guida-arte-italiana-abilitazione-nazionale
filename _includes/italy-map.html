<div class="italy-map" aria-label="Mappa navigabile delle regioni italiane">
  <svg viewBox="0 0 1200 1360" role="img" aria-labelledby="italy-map-title italy-map-desc">
    <title id="italy-map-title">Mappa dell'Italia per regioni e province autonome</title>
    <desc id="italy-map-desc">Mappa SVG dell'Italia con aree cliccabili per le pagine territoriali.</desc>

    <rect class="map-panel" x="0" y="0" width="1200" height="1360" rx="18" />
    <image
      class="map-base"
      href="{{ '/assets/img/italy-regions-wikimedia.svg' | relative_url }}"
      x="0"
      y="0"
      width="1200"
      height="1500"
      preserveAspectRatio="xMidYMid meet" />

    <g class="map-links">
      <a href="{{ '/regioni/valle-d-aosta/' | relative_url }}" aria-label="Valle d'Aosta">
        <title>Valle d'Aosta</title>
        <path class="map-region" d="M88 178 184 160 231 211 195 277 112 274 65 229Z" />
      </a>

      <a href="{{ '/regioni/piemonte/' | relative_url }}" aria-label="Piemonte">
        <title>Piemonte</title>

      </a>

      </a>

      <a href="{{ '/regioni/provincia-autonoma-di-bolzano/' | relative_url }}" aria-label="Provincia autonoma di Bolzano">

<noscript>
  <ul class="region-fallback">
    {% for regione in site.data.regioni %}
      <li><a href="{{ '/regioni/' | append: regione.slug | append: '/' | relative_url }}">{{ regione.title }}</a></li>
    {% endfor %}
  </ul>
</noscript>
